<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropi — Set de Emails</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F3F4F6; color: #111827; }
  #root { display: flex; height: 100vh; overflow: hidden; }

  /* ── Animations ── */
  @keyframes drp-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes drp-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: .9; } }
  @keyframes drp-confetti-1 { 0% { transform: translate(0,0) rotate(0); opacity: 1; } 100% { transform: translate(-60px,80px) rotate(360deg); opacity: 0; } }
  @keyframes drp-confetti-2 { 0% { transform: translate(0,0) rotate(0); opacity: 1; } 100% { transform: translate(60px,80px) rotate(-360deg); opacity: 0; } }
  @keyframes drp-confetti-3 { 0% { transform: translate(0,0) rotate(0); opacity: 1; } 100% { transform: translate(-30px,90px) rotate(180deg); opacity: 0; } }
  @keyframes drp-confetti-4 { 0% { transform: translate(0,0) rotate(0); opacity: 1; } 100% { transform: translate(40px,100px) rotate(-180deg); opacity: 0; } }
  @keyframes drp-progress { from { width: 0; } to { width: 66%; } }
  @keyframes drp-radar { 0% { transform: scale(0.4); opacity: 0.8; } 100% { transform: scale(2.4); opacity: 0; } }
  @keyframes drp-counter { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes drp-shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  @keyframes drp-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes drp-rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  @keyframes drp-fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes drp-pin-drop { 0% { transform: translateY(-20px); opacity: 0; } 60% { transform: translateY(2px); opacity: 1; } 100% { transform: translateY(0); opacity: 1; } }
  @keyframes drp-truck { 0% { transform: translateX(-15px); } 50% { transform: translateX(15px); } 100% { transform: translateX(-15px); } }

  .drp-anim-float { animation: drp-float 3s ease-in-out infinite; }
  .drp-anim-pulse { animation: drp-pulse 2s ease-in-out infinite; }
  .drp-anim-bounce { animation: drp-bounce 1.6s ease-in-out infinite; }
  .drp-anim-rotate { animation: drp-rotate 8s linear infinite; }
  .drp-anim-truck { animation: drp-truck 4s ease-in-out infinite; }
  .drp-anim-progress::after {
    content: ''; position: absolute; left: 0; top: 0; height: 100%;
    background: linear-gradient(90deg, #F97316, #FB923C);
    border-radius: 999px;
    animation: drp-progress 2.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .drp-anim-shimmer {
    background: linear-gradient(90deg, #F9FAFB 0%, #F3F4F6 40%, #F9FAFB 80%);
    background-size: 800px 100%;
    animation: drp-shimmer 2.5s linear infinite;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const COLORS = {
  orange: '#F97316',
  orangeSoft: '#FFF7ED',
  green: '#10B981',
  greenSoft: '#ECFDF5',
  emailBg: '#F9FAFB',
  cardBg: '#FFFFFF',
  textPrimary: '#111827',
  textSecondary: '#6B7280',
  textTertiary: '#9CA3AF',
  border: '#E5E7EB',
  red: '#EF4444',
};

// Sample variable values for preview
const VARS = {
  nombre: 'Camila',
  tienda: 'Moda Urbana CO',
  categoria: 'Ropa y Accesorios',
  dropshippers: '3.847',
  ciudad: 'Bogotá',
  producto: 'Vestido Lino Premium',
  pedido_id: '#DRP-00421',
  pedido_cliente: 'Sebastián Torres',
  ganancia: '$47.000',
  dias_registro: '1',
};

const EMAILS = [
  {
    id: 'E1',
    titulo: 'Bienvenida post-signup',
    fase: 'Signup',
    prioridad: 'Alta',
    trigger: 'Registro completado (máx. 5 min)',
    asunto: `Bienvenido a Dropi, ${VARS.nombre} — esto es lo que sigue`,
    preview: 'Tu marca ya tiene un lugar en el ecosistema. Aquí el primer paso.',
    headerColor: COLORS.orange,
  },
  {
    id: 'E2',
    titulo: 'Abandono de onboarding',
    fase: 'Activación',
    prioridad: 'Alta',
    trigger: 'Sin completar onboarding en 2 horas',
    asunto: `${VARS.nombre}, quedaste a un paso`,
    preview: 'Menos de 5 minutos y tu marca ya está visible para los dropshippers.',
    headerColor: COLORS.orange,
  },
  {
    id: 'E3',
    titulo: '24h sin publicar producto',
    fase: 'Activación',
    prioridad: 'Alta',
    trigger: '24h después del registro sin producto',
    asunto: `Hoy hay ${VARS.dropshippers} dropshippers buscando en ${VARS.categoria}`,
    preview: 'Cada día sin producto publicado es una oportunidad que se va.',
    headerColor: COLORS.orange,
  },
  {
    id: 'E4',
    titulo: 'Producto publicado sin aha moment',
    fase: 'Activación',
    prioridad: 'Media-Alta',
    trigger: 'Publicó producto pero no vio pantalla s7',
    asunto: `Tu producto ya está visible, ${VARS.nombre} — mira quién lo ve`,
    preview: `${VARS.dropshippers} dropshippers en ${VARS.categoria} ya pueden encontrarte.`,
    headerColor: COLORS.orange,
  },
  {
    id: 'E5',
    titulo: 'Primer pedido recibido',
    fase: 'Activación',
    prioridad: 'Alta',
    trigger: 'Primer pedido generado (menos de 5 min)',
    asunto: `${VARS.nombre}, tienes tu primer pedido 🎉`,
    preview: `${VARS.pedido_cliente} ordenó ${VARS.producto}. Completa 2 pasos para despacharlo.`,
    headerColor: COLORS.green,
  },
  {
    id: 'E6',
    titulo: 'Reenganche con referencia social',
    fase: 'Reenganche',
    prioridad: 'Media',
    trigger: '7 días sin actividad en la plataforma',
    asunto: 'Cómo Valentina activó su marca en Dropi en 4 días',
    preview: '"No sabía que podía empezar sin tener todo perfecto." — Valentina M.',
    headerColor: COLORS.orange,
  },
  {
    id: 'E7',
    titulo: 'Invitación humana de soporte',
    fase: 'Reenganche',
    prioridad: 'Media-Baja',
    trigger: '15 días sin actividad en la plataforma',
    asunto: `${VARS.nombre}, ¿podemos ayudarte en 10 minutos?`,
    preview: 'A veces una duda pequeña es lo único que frena el primer paso.',
    headerColor: COLORS.orange,
  },
];

// ───── Email Body Components ─────

function EmailShell({ children, headerColor = COLORS.orange, subject, preview }) {
  return (
    <div style={{ background: COLORS.emailBg, padding: '0 0 40px 0', minHeight: '100%' }}>
      {/* Email client top bar */}
      <div style={{ background: '#fff', borderBottom: `1px solid ${COLORS.border}`, padding: '16px 24px', marginBottom: '0' }}>
        <div style={{ fontSize: 11, color: COLORS.textTertiary, marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Vista previa del email</div>
        <div style={{ fontSize: 15, fontWeight: 600, color: COLORS.textPrimary, marginBottom: 2 }}>{subject}</div>
        <div style={{ fontSize: 13, color: COLORS.textSecondary }}>{preview}</div>
      </div>

      {/* Email header */}
      <div style={{ background: headerColor, padding: '20px 32px', textAlign: 'center' }}>
        <img src="uploads/cropped-Horizontal.png" alt="dropi" style={{ height: 36, filter: 'brightness(0) invert(1)' }} />
      </div>

      {/* Body card */}
      <div style={{
        background: COLORS.cardBg,
        borderRadius: 12,
        maxWidth: 560,
        padding: '40px',
        margin: '24px auto',
        boxShadow: '0 1px 3px rgba(0,0,0,0.07)',
      }}>
        {children}
      </div>

      {/* Footer */}
      <div style={{
        maxWidth: 560, margin: '0 auto', textAlign: 'center',
        fontSize: 12, color: COLORS.textTertiary, padding: '0 24px',
      }}>
        <p>Dropi · <span style={{ textDecoration: 'underline', cursor: 'pointer' }}>Unsubscribe</span> · <span style={{ textDecoration: 'underline', cursor: 'pointer' }}>Legal</span></p>
        <p style={{ marginTop: 4 }}>Dropi S.A.S. · Bogotá, Colombia</p>
      </div>
    </div>
  );
}

function Eyebrow({ children, color = COLORS.orange }) {
  return <p style={{ fontSize: 12, fontWeight: 600, color, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 10 }}>{children}</p>;
}
function H1({ children }) {
  return <h1 style={{ fontSize: 26, fontWeight: 700, color: COLORS.textPrimary, lineHeight: 1.3, marginBottom: 16 }}>{children}</h1>;
}
function P({ children, style }) {
  return <p style={{ fontSize: 16, color: '#374151', lineHeight: 1.7, marginBottom: 16, ...style }}>{children}</p>;
}
function Muted({ children }) {
  return <p style={{ fontSize: 14, color: COLORS.textSecondary, lineHeight: 1.6, marginBottom: 12 }}>{children}</p>;
}
function CTA({ children, href = '#' }) {
  return (
    <div style={{ textAlign: 'center', margin: '28px 0 8px' }}>
      <a href={href} style={{
        display: 'inline-block', background: COLORS.orange, color: '#fff',
        fontSize: 16, fontWeight: 600, padding: '14px 32px',
        borderRadius: 8, textDecoration: 'none',
      }}>{children} →</a>
    </div>
  );
}
function HighlightBlock({ children, color = COLORS.orange, bg = COLORS.orangeSoft }) {
  return (
    <div style={{
      background: bg, borderLeft: `4px solid ${color}`,
      borderRadius: '0 8px 8px 0', padding: '16px 20px', margin: '20px 0',
      fontSize: 15, color: COLORS.textPrimary, lineHeight: 1.6,
    }}>{children}</div>
  );
}
function Divider() {
  return <div style={{ borderTop: `1px solid ${COLORS.border}`, margin: '24px 0' }}></div>;
}
function StatBlock({ stats }) {
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: `repeat(${stats.length}, 1fr)`,
      gap: 1, background: COLORS.border, borderRadius: 10, overflow: 'hidden', margin: '20px 0',
    }}>
      {stats.map((s, i) => (
        <div key={i} style={{ background: '#F9FAFB', padding: '16px 12px', textAlign: 'center' }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: COLORS.textPrimary }}>{s.value}</div>
          <div style={{ fontSize: 12, color: COLORS.textSecondary, lineHeight: 1.4, marginTop: 4 }}>{s.label}</div>
        </div>
      ))}
    </div>
  );
}
function StepList({ steps }) {
  return (
    <div style={{ margin: '20px 0' }}>
      {steps.map((s, i) => (
        <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 14 }}>
          <div style={{
            width: 28, height: 28, borderRadius: '50%', background: COLORS.orangeSoft,
            color: COLORS.orange, fontSize: 13, fontWeight: 700, display: 'flex',
            alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 2,
          }}>{i + 1}</div>
          <p style={{ fontSize: 15, color: COLORS.textPrimary, lineHeight: 1.6, margin: 0 }}>{s}</p>
        </div>
      ))}
    </div>
  );
}
function ProgressItem({ label, done, current }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
      <div style={{
        width: 22, height: 22, borderRadius: '50%', flexShrink: 0,
        background: done ? COLORS.green : current ? COLORS.orangeSoft : '#F3F4F6',
        border: current ? `2px solid ${COLORS.orange}` : 'none',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 12,
      }}>
        {done ? '✓' : current ? '·' : ''}
      </div>
      <span style={{
        fontSize: 15, color: done ? COLORS.textSecondary : COLORS.textPrimary,
        fontWeight: current ? 600 : 400,
      }}>{label}{current && <span style={{ color: COLORS.orange, fontSize: 13, marginLeft: 8 }}>← estás aquí</span>}</span>
    </div>
  );
}
function OrderCard() {
  return (
    <div style={{ border: `1px solid ${COLORS.border}`, borderRadius: 10, overflow: 'hidden', margin: '20px 0' }}>
      <div style={{ background: COLORS.greenSoft, padding: '10px 16px', borderBottom: `1px solid #D1FAE5` }}>
        <span style={{ fontSize: 13, fontWeight: 600, color: COLORS.green }}>Pedido {VARS.pedido_id}</span>
      </div>
      <div style={{ padding: '16px' }}>
        {[
          ['Producto', VARS.producto],
          ['Cliente', VARS.pedido_cliente],
          ['Ganancia', VARS.ganancia],
          ['Estado', 'Pendiente de despacho'],
        ].map(([k, v]) => (
          <div key={k} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: 14 }}>
            <span style={{ color: COLORS.textSecondary }}>{k}</span>
            <span style={{ color: COLORS.textPrimary, fontWeight: k === 'Ganancia' ? 700 : 500 }}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
// ───── Iconography (inline SVG, monoline + duotone) ─────
const Icon = ({ d, size = 20, color = COLORS.orange, fill = 'none', stroke = 2, style }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, ...style }}>
    {typeof d === 'string' ? <path d={d}/> : d}
  </svg>
);
const IconStore = (p) => <Icon {...p} d={<><path d="M3 9l1.5-5h15L21 9"/><path d="M3 9v11h18V9"/><path d="M9 14h6"/></>}/>;
const IconBox = (p) => <Icon {...p} d={<><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></>}/>;
const IconUsers = (p) => <Icon {...p} d={<><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.2"/><path d="M3 20c.5-3.5 3-5 6-5s5.5 1.5 6 5"/><path d="M15 20c.3-2 1.5-3 3-3s2.7 1 3 3"/></>}/>;
const IconRocket = (p) => <Icon {...p} d={<><path d="M14.5 3c4 0 6.5 2.5 6.5 6.5L13 18l-4-4L17.5 5.5c0-1.5-1-2.5-2.5-2.5z" /><circle cx="15.5" cy="8.5" r="1.5"/><path d="M9 14l-4 1 1-4"/><path d="M5 19l-2 2"/></>}/>;
const IconBell = (p) => <Icon {...p} d={<><path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 19a2 2 0 004 0"/></>}/>;
const IconClock = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></>}/>;
const IconTruck = (p) => <Icon {...p} d={<><path d="M2 7h11v9H2zM13 10h5l3 3v3h-8z"/><circle cx="6.5" cy="17" r="1.7"/><circle cx="17.5" cy="17" r="1.7"/></>}/>;
const IconChart = (p) => <Icon {...p} d={<><path d="M3 21V5"/><path d="M3 17l5-5 4 3 7-8"/><path d="M14 7h5v5"/></>}/>;
const IconCheck = (p) => <Icon {...p} d="M5 13l4 4L19 7"/>;
const IconArrow = (p) => <Icon {...p} d="M5 12h14M13 5l7 7-7 7"/>;
const IconHeart = (p) => <Icon {...p} d="M12 20s-7-4.5-7-10a4 4 0 017-2.5A4 4 0 0119 10c0 5.5-7 10-7 10z"/>;
const IconSpark = (p) => <Icon {...p} d={<><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M5.6 18.4l2.8-2.8M15.6 8.4l2.8-2.8"/></>}/>;
const IconWhats = (p) => <Icon {...p} d={<><path d="M21 12a9 9 0 11-3.5-7.1L21 4l-1.1 3.5A8.96 8.96 0 0121 12z"/><path d="M8.5 9.5c.5 2 2 3.5 4 4 .8.2 1.7-.1 2-1l.5-1-2-1-1 1c-1-.5-1.5-1-2-2l1-1-1-2-1 .5c-.9.3-1.2 1.2-1 2z"/></>}/>;
const IconPin = (p) => <Icon {...p} d={<><path d="M12 22s-7-7-7-12a7 7 0 0114 0c0 5-7 12-7 12z"/><circle cx="12" cy="10" r="2.5"/></>}/>;
const IconCoin = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="9"/><path d="M9 9.5C9 8.5 10 7.5 12 7.5s3 1 3 2.2c0 2.3-5 1.5-5 4 0 1.2 1 2.3 3 2.3s3-1 3-2.2"/><path d="M12 6v1.5M12 16.5V18"/></>}/>;
const IconChat = (p) => <Icon {...p} d={<><path d="M21 12c0 4-4 7-9 7-1 0-2-.1-2.9-.4L4 20l1.4-3.6A6.5 6.5 0 013 12c0-4 4-7 9-7s9 3 9 7z"/></>}/>;

// ───── Hero Illustrations ─────

function HeroWelcome() {
  return (
    <div style={{
      position: 'relative', height: 200, borderRadius: 12, overflow: 'hidden',
      margin: '0 0 28px',
      background: 'linear-gradient(135deg, #FFF7ED 0%, #FFEDD5 100%)',
    }}>
      {/* radar pulses */}
      {[0, 1, 2].map(i => (
        <div key={i} style={{
          position: 'absolute', left: '50%', top: '50%',
          width: 24, height: 24, borderRadius: '50%',
          border: `2px solid ${COLORS.orange}`,
          marginLeft: -12, marginTop: -12, opacity: 0.5,
          animation: `drp-radar 2.4s ease-out infinite`,
          animationDelay: `${i * 0.8}s`,
        }} />
      ))}
      {/* center store */}
      <div style={{
        position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%,-50%)',
        width: 64, height: 64, borderRadius: 16, background: '#fff',
        boxShadow: '0 8px 20px rgba(249,115,22,0.25)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2,
      }}>
        <IconStore size={32} color={COLORS.orange} />
      </div>
      {/* orbit dropshippers */}
      {[
        { l: '15%', t: '25%', d: 0 },
        { l: '78%', t: '20%', d: 0.4 },
        { l: '12%', t: '70%', d: 0.8 },
        { l: '82%', t: '72%', d: 1.2 },
        { l: '50%', t: '12%', d: 1.6 },
      ].map((p, i) => (
        <div key={i} className="drp-anim-float" style={{
          position: 'absolute', left: p.l, top: p.t,
          width: 36, height: 36, borderRadius: '50%',
          background: '#fff', boxShadow: '0 4px 10px rgba(0,0,0,0.08)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          animationDelay: `${p.d}s`,
        }}>
          <IconUsers size={18} color={COLORS.orange} />
        </div>
      ))}
    </div>
  );
}

function HeroProgressRing() {
  return (
    <div style={{ display: 'flex', justifyContent: 'center', margin: '0 0 24px' }}>
      <div style={{ position: 'relative', width: 140, height: 140 }}>
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="60" fill="none" stroke="#F3F4F6" strokeWidth="10"/>
          <circle cx="70" cy="70" r="60" fill="none" stroke={COLORS.orange} strokeWidth="10"
            strokeLinecap="round" strokeDasharray="377" strokeDashoffset="125"
            transform="rotate(-90 70 70)"
            style={{ animation: 'drp-fadein 1s ease-out' }}/>
        </svg>
        <div style={{
          position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
        }}>
          <div style={{ fontSize: 28, fontWeight: 700, color: COLORS.orange }}>2/3</div>
          <div style={{ fontSize: 11, color: COLORS.textSecondary, textTransform: 'uppercase', letterSpacing: '0.05em' }}>completado</div>
        </div>
      </div>
    </div>
  );
}

function HeroOpportunity() {
  return (
    <div style={{
      position: 'relative', height: 180, borderRadius: 12, overflow: 'hidden',
      margin: '0 0 24px', background: 'linear-gradient(135deg, #FEF3C7 0%, #FFEDD5 60%, #FED7AA 100%)',
    }}>
      {/* live counter card */}
      <div style={{
        position: 'absolute', left: 24, top: 24,
        background: '#fff', borderRadius: 10, padding: '12px 16px',
        boxShadow: '0 4px 12px rgba(0,0,0,0.06)', display: 'flex', alignItems: 'center', gap: 10,
        animation: 'drp-fadein 0.8s ease-out',
      }}>
        <div style={{ width: 8, height: 8, borderRadius: '50%', background: COLORS.green }} className="drp-anim-pulse" />
        <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.textPrimary }}>EN VIVO</span>
      </div>
      {/* big number */}
      <div style={{
        position: 'absolute', right: 24, top: '50%', transform: 'translateY(-50%)',
        textAlign: 'right',
      }}>
        <div style={{
          fontSize: 56, fontWeight: 800, color: COLORS.orange, lineHeight: 1,
          letterSpacing: '-2px', animation: 'drp-counter 1s ease-out',
        }}>{VARS.dropshippers}</div>
        <div style={{ fontSize: 13, color: COLORS.textSecondary, marginTop: 4, fontWeight: 500 }}>
          dropshippers buscando ahora
        </div>
      </div>
      {/* floating mini-icons */}

const EMAIL_BODIES = [Email1, Email2, Email3, Email4, Email5, Email6, Email7];

const FASE_COLORS = {
  'Signup': { bg: '#EDE9FE', text: '#5B21B6' },
  'Activación': { bg: COLORS.orangeSoft, text: '#C2410C' },
  'Reenganche': { bg: '#ECFDF5', text: '#065F46' },
};
const PRIORIDAD_DOT = {
  'Alta': '#EF4444',
  'Media-Alta': '#F97316',
  'Media': '#F59E0B',
  'Media-Baja': '#6B7280',
};

function App() {
  const [selected, setSelected] = React.useState(0);
  const mainRef = React.useRef(null);

  React.useEffect(() => {
    if (mainRef.current) mainRef.current.scrollTop = 0;
  }, [selected]);

  const EmailBody = EMAIL_BODIES[selected];
  const email = EMAILS[selected];

  return (
    <div style={{ display: 'flex', height: '100vh', fontFamily: 'Inter, sans-serif' }}>
      {/* Sidebar */}
      <div style={{
        width: 280, background: '#fff', borderRight: `1px solid ${COLORS.border}`,
        display: 'flex', flexDirection: 'column', flexShrink: 0,
      }}>
        {/* Logo */}
        <div style={{ padding: '20px 20px 16px', borderBottom: `1px solid ${COLORS.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <img src="uploads/cropped-Horizontal.png" alt="dropi" style={{ height: 28 }} />
            <div style={{ fontSize: 11, color: COLORS.textTertiary, borderLeft: `1px solid ${COLORS.border}`, paddingLeft: 8 }}>Email Marketing Set</div>
          </div>
        </div>

        {/* Email list */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '8px 0' }}>
          <div style={{ padding: '8px 16px 4px', fontSize: 11, fontWeight: 600, color: COLORS.textTertiary, textTransform: 'uppercase', letterSpacing: '0.07em' }}>
            Secuencia — 7 emails
          </div>
          {EMAILS.map((em, i) => {
            const faseStyle = FASE_COLORS[em.fase] || {};
            const isActive = i === selected;
            return (
              <button key={em.id} onClick={() => setSelected(i)} style={{
                width: '100%', textAlign: 'left', padding: '10px 16px', border: 'none',
                background: isActive ? COLORS.orangeSoft : 'transparent',
                cursor: 'pointer', borderLeft: isActive ? `3px solid ${COLORS.orange}` : '3px solid transparent',
                transition: 'background 0.15s',
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                  <span style={{ fontSize: 11, fontWeight: 700, color: isActive ? COLORS.orange : COLORS.textTertiary }}>{em.id}</span>
                  <span style={{
                    fontSize: 10, fontWeight: 600, padding: '1px 6px', borderRadius: 4,
                    background: faseStyle.bg, color: faseStyle.text,
                  }}>{em.fase}</span>
                  <span style={{ marginLeft: 'auto', width: 7, height: 7, borderRadius: '50%', background: PRIORIDAD_DOT[em.prioridad], flexShrink: 0 }}></span>
                </div>
                <div style={{ fontSize: 13, fontWeight: 600, color: isActive ? COLORS.orange : COLORS.textPrimary, lineHeight: 1.3 }}>
                  {em.titulo}
                </div>
                <div style={{ fontSize: 11, color: COLORS.textTertiary, marginTop: 3, lineHeight: 1.4 }}>{em.trigger}</div>
              </button>
            );
          })}
        </div>

        {/* Legend */}
        <div style={{ padding: '12px 16px', borderTop: `1px solid ${COLORS.border}`, fontSize: 11, color: COLORS.textTertiary }}>
          <div style={{ marginBottom: 6, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Prioridad</div>
          {Object.entries(PRIORIDAD_DOT).map(([k, v]) => (
            <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3 }}>
              <span style={{ width: 7, height: 7, borderRadius: '50%', background: v, flexShrink: 0 }}></span>
              <span>{k}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Main preview */}
      <div ref={mainRef} style={{ flex: 1, overflowY: 'auto', background: '#F3F4F6' }}>
        <EmailBody />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
